    <style>
        /* ===== RESET & GLOBAL ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-dark: #0a1628;
            --bg-card: #111d33;
            --bg-card-hover: #18263f;
            --gold: #f5c842;
            --gold-glow: rgba(245, 200, 66, 0.3);
            --text-primary: #e8edf5;
            --text-secondary: #8a9bb5;
            --text-muted: #5a6f8a;
            --border-color: #1a2a44;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }
        body.light-mode {
            --bg-dark: #f0f4fa;
            --bg-card: #ffffff;
            --bg-card-hover: #f5f8fc;
            --text-primary: #0a1628;
            --text-secondary: #3a4a66;
            --text-muted: #7a8aa0;
            --border-color: #dce3ed;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        a {
            color: var(--gold);
            text-decoration: none;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            outline: none;
            background: none;
            color: inherit;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* ===== SPLASH SCREEN ===== */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            pointer-events: none;
        }
        #splash.hide {
            opacity: 0;
            transform: scale(1.02);
            pointer-events: none;
        }
        #splash canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .splash-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
        }
        .splash-logo {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold-glow), 0 0 60px var(--gold-glow);
            animation: glowPulse 1.5s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }
        .splash-logo span {
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        @keyframes glowPulse {
            0% {
                text-shadow: 0 0 20px var(--gold-glow), 0 0 40px var(--gold-glow);
            }
            100% {
                text-shadow: 0 0 40px var(--gold-glow), 0 0 80px var(--gold-glow), 0 0 120px rgba(245, 200, 66, 0.15);
            }
        }
        .splash-terminal {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #4ade80;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(74, 222, 128, 0.2);
            margin-top: 20px;
            min-width: 280px;
            min-height: 48px;
            backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .splash-progress {
            width: 240px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 28px;
            overflow: hidden;
            position: relative;
        }
        .splash-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, var(--gold));
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .splash-progress-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
        }
        .splash-skip {
            position: absolute;
            top: 20px;
            right: 24px;
            z-index: 5;
            padding: 8px 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 0.8rem;
            backdrop-filter: blur(8px);
            transition: var(--transition);
            pointer-events: auto;
        }
        .splash-skip:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
        .splash-sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* ===== LAYOUT ===== */
        #app {
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            min-height: 100vh;
        }
        #app.show {
            display: flex;
            opacity: 1;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 240px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            transition: transform 0.3s ease, background 0.3s;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar.collapsed {
            transform: translateX(-100%);
        }
        .sidebar-brand {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
            padding: 8px 8px 16px 8px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-brand i {
            font-size: 1.2rem;
        }
        .sidebar-brand span {
            color: #fff;
        }
        .sidebar-nav {
            flex: 1;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            transition: var(--transition);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .sidebar-nav a i {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        .sidebar-nav a.active {
            color: var(--gold);
        }
        .sidebar-nav .nav-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding: 12px 14px 6px 14px;
            font-weight: 600;
        }
        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar-footer .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.03);
        }
        .sidebar-footer .user-card .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gold);
            color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .sidebar-footer .user-card .info {
            flex: 1;
            font-size: 0.8rem;
        }
        .sidebar-footer .user-card .info .name {
            font-weight: 600;
            color: var(--text-primary);
        }
        .sidebar-footer .user-card .info .role {
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        .sidebar-toggle {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 101;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--text-secondary);
            transition: var(--transition);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
        }
        .sidebar-toggle:hover {
            background: var(--bg-card-hover);
            color: var(--gold);
        }
        .sidebar-toggle.hidden {
            display: none;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 240px;
            padding: 20px 24px 40px;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }
        .main-content.expanded {
            margin-left: 0;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(17, 29, 51, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            margin-bottom: 24px;
            position: sticky;
            top: 12px;
            z-index: 50;
            box-shadow: var(--shadow);
            transition: background 0.3s;
        }
        body.light-mode .navbar {
            background: rgba(255, 255, 255, 0.75);
        }
        .navbar .left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .navbar .left .page-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.2rem;
        }
        .navbar .left .page-title i {
            color: var(--gold);
            margin-right: 8px;
        }
        .navbar .right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar .right .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 14px;
            gap: 8px;
            transition: var(--transition);
        }
        .navbar .right .search-box:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .navbar .right .search-box input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            width: 140px;
        }
        .navbar .right .search-box input::placeholder {
            color: var(--text-muted);
        }
        .navbar .right .search-box i {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .navbar .right .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: var(--transition);
            position: relative;
            font-size: 0.95rem;
        }
        .navbar .right .icon-btn:hover {
            background: var(--bg-card-hover);
            color: var(--gold);
        }
        .navbar .right .icon-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ef4444;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
        }
        .navbar .right .theme-toggle {
            font-size: 1.1rem;
        }

        /* ===== PAGES ===== */
        .page {
            display: none;
            animation: fadePage 0.4s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadePage {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            margin-bottom: 20px;
        }
        .card:hover {
            border-color: rgba(245, 200, 66, 0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-header h3 {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header h3 i {
            color: var(--gold);
        }

        /* ===== GRID ===== */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        /* ===== STATS ===== */
        .stat-card {
            text-align: center;
            padding: 18px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            transition: var(--transition);
        }
        .stat-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }
        .stat-card .number {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
        }
        .stat-card .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .stat-card .icon {
            font-size: 1.6rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        /* ===== CHART WRAPPER ===== */
        .chart-wrapper {
            width: 100%;
            height: 600px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-card);
            position: relative;
        }
        .chart-wrapper .tradingview-widget-container {
            width: 100%;
            height: 100%;
        }
        .chart-wrapper .tradingview-widget-container iframe {
            width: 100%;
            height: 100%;
        }

        /* ===== NEWS ===== */
        .news-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .news-tabs button {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            flex: 1;
            min-width: 100px;
        }
        .news-tabs button.active {
            background: var(--gold);
            color: var(--bg-dark);
        }
        .news-tabs button:hover:not(.active) {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        .news-list {
            display: flex;
